<body>
    <nav id="sidebar">
    
      <!-- Toggle -->
      <button class="toggle-btn" onclick="toggleNav()" title="Toggle sidebar">
        <i class="ri-arrow-left-s-fill"></i>
    </button>
    
      <!-- Header -->
      <div class="nav-header">
        <div class="logo-mark">
            <i class="ri-bard-fill"></i>
        </div>
        <span class="logo-text">AI bot</span>
    </div>
    
    <!-- Nav Body -->
      <div class="nav-body">
          
        <div class="section-label">Action</div>
          
        <a class="nav-item active" href="#" data-tip="Dashboard">
            <div class="item-icon-wrap">
                <i class="ri-add-line"></i>
            </div>
            <span class="item-label">New chat</span>
        </a>
    
        <a class="nav-item" href="#" data-tip="Analytics">
          <div class="item-icon-wrap">
            <i class="ri-search-line"></i>
          </div>
          <span class="item-label">Search</span>
        </a>
    
        <a class="nav-item" href="#" data-tip="Projects">
          <div class="item-icon-wrap">
            <i class="ri-folder-line"></i>
          </div>
          <span class="item-label">Projects</span>
          <span class="item-badge">New</span>
        </a>
    
        
        <div class="nav-divider"></div>
        <div class="section-label">Chats</div>
        
        <a class="nav-item" href="#" data-tip="Messages">
          <div class="item-icon-wrap">
            <i class="ri-chat-3-line"></i>
          </div>
          <span class="item-label">Messages</span>
          <span class="item-badge">4</span>
        </a>
    </div>

    <div class="nav-divider"></div>
    <div class="section-label">System</div>

    <a class="nav-item" href="#" data-tip="Settings">
      <div class="item-icon-wrap">
        <i class="ri-settings-5-line"></i>
      </div>
      <span class="item-label">Settings</span>
    </a>

    <a class="nav-item" href="#" data-tip="Help">
      <div class="item-icon-wrap">
        <i class="ri-question-line"></i>
      </div>
      <span class="item-label">Help & Support</span>
    </a>
    
      <!-- Footer -->
      <div class="nav-footer">
        <div class="user-card">
          <div class="avatar">JD</div>
          <div class="user-info">
            <div class="user-name">Jamie Doss</div>
            <div class="user-role">Admin · Pro</div>
          </div>
        </div>
      </div>
    
    </nav>

    <div class="container">
        <div class="content">
            <div class="logo">
                <h2><i class="ri-bard-fill"></i>AI bot</h2>
            </div>
            <div class="title">Chat with your personal AI</div>
            <div class="action" style="display: none;">
                <div class="choice-button">
                    <p class="member-btn">Early access for Arc Members</p>
                    <button class="show-btn">Download AI bot</button>
                </div>
                <div class="options">
                    <p>Not an Arc member? <a href="#">Join the waitlist<i class="ri-arrow-right-line"></i></a></p>
                </div>
            </div>

            <div class="chats-container"></div>

            <div class="prompt-container">
              <div class="prompt-wrapper">
                <form action="#" class="prompt-form">
                  <input type="text" placeholder="Ask AI bot" class="prompt-input" required>
                  <div class="prompt-action">
                    <button id="add-file-btn" type="button"><i class="ri-add-line"></i></button>
                    <button id="send-prompt-btn"><i class="ri-arrow-up-line"></i></button>
                  </div>
                </form>

                <!-- <button id="theme-toggle-btn"><i class="ri-sun-line"></i></button>
                <button id="delete-chats-btn"><i class="ri-delete-bin-5-line"></i></button> -->
              </div>
            </div>
        </div>
        <p class="disclaimer-text">AI bot can make mistakes, so double-check it.</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
